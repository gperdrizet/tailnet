# nginx reverse proxy config for Headscale.
#
# Headscale listens on localhost:8090 without TLS.
# nginx terminates TLS and proxies all traffic, including WebSocket upgrades
# used by long-lived Tailscale client connections.
#
# Deploy to: /etc/nginx/sites-available/headscale
# Enable with: sudo ln -s /etc/nginx/sites-available/headscale /etc/nginx/sites-enabled/headscale
# Reload with: sudo systemctl reload nginx

server {
    listen 80;
    server_name headscale.perdrizet.org;

    # Redirect all HTTP traffic to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name headscale.perdrizet.org;

    ssl_certificate     /etc/letsencrypt/live/headscale.perdrizet.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/headscale.perdrizet.org/privkey.pem;

    # Modern TLS settings.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    location / {
        proxy_pass http://127.0.0.1:8090;

        # Preserve the original host header so Headscale can validate it.
        proxy_set_header Host $host;

        # Pass the real client IP through to Headscale logs.
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Support WebSocket upgrades for long-lived Tailscale client connections.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Disable buffering and extend timeout for long-lived connections.
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}
